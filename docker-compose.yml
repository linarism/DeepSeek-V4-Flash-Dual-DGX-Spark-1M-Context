services:
  vllm:
    image: aidendle94/sparkrun-vllm-ds4-gb10:production-ready
    container_name: vllm_dsf1m_prod
    network_mode: host
    ipc: host
    shm_size: "64gb"

    ulimits:
      memlock: -1
      stack: 67108864

    gpus: all

    devices:
      - /dev/infiniband:/dev/infiniband

    volumes:
      - ${HF_CACHE:-${HOME}/.cache/huggingface}:/cache/huggingface
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    environment:
      HF_HOME: /cache/huggingface
      HF_HUB_OFFLINE: "1"
      VLLM_CACHE_ROOT: /cache/huggingface/vllm-cache

      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
      VLLM_MARLIN_USE_ATOMIC_ADD: "1"

      TORCH_CUDA_ARCH_LIST: "12.1a"
      FLASHINFER_CUDA_ARCH_LIST: "12.1a"

      NCCL_NET: IB
      NCCL_IB_DISABLE: "0"
      NCCL_IB_HCA: "${NCCL_IB_HCA}"
      NCCL_SOCKET_IFNAME: "${NCCL_SOCKET_IFNAME}"
      NCCL_NET_PLUGIN: "none"
      NCCL_IB_SUBNET_AWARE_ROUTING: "1"
      NCCL_IB_MERGE_NICS: "0"
      NCCL_CROSS_NIC: "1"
      NCCL_IB_GID_INDEX: "${NCCL_IB_GID_INDEX:-3}"
      NCCL_CUMEM_ENABLE: "0"
      NCCL_IGNORE_CPU_AFFINITY: "1"
      NCCL_DEBUG: WARN

      VLLM_HOST_IP: "${VLLM_HOST_IP:?node QSFP IP}"
      MN_IF_NAME: "${NCCL_SOCKET_IFNAME}"
      GLOO_SOCKET_IFNAME: "${NCCL_SOCKET_IFNAME}"
      TP_SOCKET_IFNAME: "${NCCL_SOCKET_IFNAME}"

      NODE_RANK: "${NODE_RANK}"
      HEADLESS: "${HEADLESS:-}"
      MASTER_ADDR: "${MASTER_ADDR}"

    command:
      - bash
      - -lc
      - >
        exec /usr/local/bin/dsv4-vllm-entrypoint serve deepseek-ai/DeepSeek-V4-Flash
        --served-model-name deepseek-v4-flash
        --host 0.0.0.0
        --port 8000
        --trust-remote-code
        --tensor-parallel-size 2
        --pipeline-parallel-size 1
        --kv-cache-dtype fp8
        --block-size 256
        --max-model-len 1000000
        --max-num-seqs ${DSF1M_MAX_NUM_SEQS:-4}
        --max-num-batched-tokens 8192
        --gpu-memory-utilization ${DSF1M_GPU_MEMORY_UTILIZATION:-0.9}
        --enable-prefix-caching
        --enable-chunked-prefill
        --compilation-config '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
        --speculative-config '{"method":"mtp","num_speculative_tokens":2}'
        --tokenizer-mode deepseek_v4
        --distributed-executor-backend mp
        --tool-call-parser deepseek_v4
        --enable-auto-tool-choice
        --reasoning-parser deepseek_v4
        --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"","reasoning_end_str":""}'
        --default-chat-template-kwargs.thinking=true
        --default-chat-template-kwargs.preserve_thinking=true
        --default-chat-template-kwargs.reasoning_effort=high
        --enable-flashinfer-autotune
        --nnodes 2
        --node-rank ${NODE_RANK}
        --master-addr ${MASTER_ADDR}
        --master-port 25000
        ${HEADLESS:+--headless}
